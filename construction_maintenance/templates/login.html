<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 建筑工程维护系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}?v=2.1.3">
  </head>
  <body>
    <main style="max-width: 420px; margin: 12vh auto; padding: 32px;">
      <h1>管理员登录</h1>
      {% if request.method == 'POST' %}
        <p role="alert" style="color: var(--danger-text, #b42318);">用户名或密码错误。</p>
      {% endif %}
      <form method="post" action="{{ url_for('web.login', next=next) if next else url_for('web.login') }}">
        <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
        <label>用户名<br><input name="username" autocomplete="username" required></label>
        <br>
        <label>密码<br><input type="password" name="password" autocomplete="current-password" required></label>
        <br>
        <button type="submit">登录</button>
      </form>
    </main>
  </body>
</html>
