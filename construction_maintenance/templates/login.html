<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 建筑工程维护系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}?v=2.1.6">
  </head>
  <body class="login-page">
    <main class="login-layout">
      <section class="login-showcase" aria-label="系统界面展示">
        <header class="login-showcase-brand">
          <span class="login-showcase-mark" aria-hidden="true">
            <img src="{{ url_for('static', filename='icons/hardhat.png') }}" alt="">
          </span>
          <span>
            <small>CAM SYSTEM</small>
            <strong>建筑工程维护系统</strong>
          </span>
        </header>

        <div class="login-showcase-copy">
          <span>CONSTRUCTION DATA WORKSPACE</span>
          <strong>工程运营集中工作台</strong>
        </div>

        <figure class="login-showcase-window">
          <img
            src="{{ url_for('static', filename='login-showcase.png') }}"
            alt="建筑工程维护系统数据看板界面"
          >
        </figure>

        <span class="login-showcase-accent" aria-hidden="true"></span>
      </section>

      <section class="login-access" aria-labelledby="login-title">
        <div class="login-access-inner">
          <header class="login-access-header">
            <span class="login-access-label">SECURE ACCESS</span>
            <span class="login-access-status">
              <span aria-hidden="true"></span>
              服务在线
            </span>
          </header>

          <div class="login-heading">
            <p>管理员登录</p>
            <h1 id="login-title">欢迎回来</h1>
          </div>

          {% if request.method == 'POST' %}
            <div class="login-alert" role="alert">
              <img src="{{ url_for('static', filename='icons/error.png') }}" alt="">
              <span>用户名或密码错误，请重新输入。</span>
            </div>
          {% endif %}

          <form class="login-form" method="post" action="{{ url_for('web.login', next=next) if next else url_for('web.login') }}">
            <input type="hidden" name="_csrf" value="{{ csrf_token() }}">

            <div class="login-field">
              <label for="login-username">用户名</label>
              <div class="login-input-control">
                <img src="{{ url_for('static', filename='icons/user.png') }}" alt="">
                <input
                  id="login-username"
                  name="username"
                  autocomplete="username"
                  inputmode="text"
                  autofocus
                  required
                >
              </div>
            </div>

            <div class="login-field">
              <label for="login-password">密码</label>
              <div class="login-password-field">
                <input
                  id="login-password"
                  type="password"
                  name="password"
                  autocomplete="current-password"
                  required
                >
                <button
                  class="login-password-toggle"
                  type="button"
                  aria-label="显示密码"
                  aria-pressed="false"
                  title="显示密码"
                >
                  <img src="{{ url_for('static', filename='icons/preview.png') }}" alt="">
                </button>
              </div>
            </div>

            <button class="login-submit" type="submit">
              <span>进入工作台</span>
              <span class="login-submit-arrow" aria-hidden="true">→</span>
            </button>
          </form>

          <footer class="login-footnote">
            <span>仅限授权人员访问</span>
            <span>v0.2.16</span>
          </footer>
        </div>
      </section>
    </main>

    <script>
      const passwordInput = document.getElementById('login-password');
      const passwordToggle = document.querySelector('.login-password-toggle');
      passwordToggle.addEventListener('click', () => {
        const shouldShow = passwordInput.type === 'password';
        passwordInput.type = shouldShow ? 'text' : 'password';
        passwordToggle.setAttribute('aria-pressed', String(shouldShow));
        passwordToggle.setAttribute('aria-label', shouldShow ? '隐藏密码' : '显示密码');
        passwordToggle.setAttribute('title', shouldShow ? '隐藏密码' : '显示密码');
        passwordInput.focus();
      });
    </script>
  </body>
</html>
